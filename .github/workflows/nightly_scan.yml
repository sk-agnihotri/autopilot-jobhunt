name: Nightly Autopilot Scan

on:
  schedule:
    - cron: '30 2 * * *' # Runs everyday at 2:30 AM UTC
  workflow_dispatch: # Allows you to trigger it manually from GitHub UI

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e '.'

      - name: Run Job Hunt Scan
        env:
          TINYFISH_API_KEY: ${{ secrets.TINYFISH_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. Initialize the required template folders in the project workspace
          autopilot init
          
          # 2. Securely write the GitHub secret variables into the local configuration env
          echo "TINYFISH_API_KEY=${TINYFISH_API_KEY}" > .env
          echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY}" >> .env
          echo "TELEGRAM_TOKEN=${TELEGRAM_TOKEN}" >> .env
          echo "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}" >> .env
          
          # 3. Force overwrite the auto-generated config with your committed config.json
          # (Using an absolute path to the local directory avoids the 'same file' safety warning)
          cp -f ./config.json ./config.json
          
          # 4. Overwrite the auto-generated template resume with SAUMYA_RESUME.md
          cp -f ./resume/SAUMYA_RESUME.md ./resume/YOUR_RESUME.md
          
          # 5. Fire the scan agent
          autopilot scan