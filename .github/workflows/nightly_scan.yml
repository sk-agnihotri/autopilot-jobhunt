name: Nightly Autopilot Scan

on:
  schedule:
    - cron: '30 2 * * *' # Runs everyday at 2:30 AM UTC
  workflow_dispatch: # Allows you to trigger it manually from GitHub UI

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e '.'

      - name: Run Job Hunt Scan
        env:
          TINYFISH_API_KEY: ${{ secrets.TINYFISH_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. Initialize the directory structure automatically
          autopilot init
          # 2. Trigger the scan
          autopilot scan