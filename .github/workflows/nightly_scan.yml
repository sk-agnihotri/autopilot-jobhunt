name: Nightly Autopilot Scan

on:
  schedule:
    - cron: '30 2 * * *' # Runs everyday at 2:30 AM UTC
  workflow_dispatch: # Allows you to trigger it manually from GitHub UI

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e '.'

      - name: Run Job Hunt Scan
        env:
          TINYFISH_API_KEY: ${{ secrets.TINYFISH_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. Initialize the framework folders
          autopilot init
          
          # 2. Inject your secure API keys into the expected backend environment layout
          echo "TINYFISH_API_KEY=${TINYFISH_API_KEY}" > .env
          echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY}" >> .env
          echo "TELEGRAM_TOKEN=${TELEGRAM_TOKEN}" >> .env
          echo "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}" >> .env
          
          # 3. Align your repository's custom configuration with the application paths
          cp config.json ~/.autopilot/config.json || cp config.json config.json
          
          # 4. Map your unique resume file to the template path the scanner executes against
          cp resume/SAUMYA_RESUME.md resume/YOUR_RESUME.md || cp resume/SAUMYA_RESUME.md ~/.autopilot/resume/YOUR_RESUME.md 2>/dev/null || true
          
          # 5. Trigger the job search scan
          autopilot scan